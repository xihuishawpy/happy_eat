name: Deploy to CloudBase

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cloudbase-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLOUDBASE_ENV_ID: shaw-d2gpfh5e6ce1c4c87
      VITE_API_BASE_URL: https://shaw-d2gpfh5e6ce1c4c87.service.tcloudbase.com

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Install CloudBase CLI
        run: npm install --global @cloudbase/cli@3.6.1

      - name: Authenticate with CloudBase
        env:
          CLOUDBASE_API_KEY: ${{ secrets.CLOUDBASE_API_KEY }}
        run: tcb login --cloudbase-api-key "$CLOUDBASE_API_KEY" --env-id "$CLOUDBASE_ENV_ID" --json

      - name: Deploy API function
        env:
          FAMILY_ACCESS_CODE: ${{ secrets.FAMILY_ACCESS_CODE }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: tcb fn deploy happy-eat-api --force --httpFn --deployMode cos --json

      - name: Deploy frontend
        run: tcb hosting deploy ./dist --env-id "$CLOUDBASE_ENV_ID" --json

      - name: Verify recipe generation route
        env:
          FAMILY_ACCESS_CODE: ${{ secrets.FAMILY_ACCESS_CODE }}
        run: |
          status=$(curl --silent --show-error --output /tmp/generate-response.json --write-out "%{http_code}" \
            --request POST "$VITE_API_BASE_URL/api/recipes/generate" \
            --header "Authorization: Bearer $FAMILY_ACCESS_CODE" \
            --header "Content-Type: application/json" \
            --data '{"ingredientIds":"invalid"}')
          test "$status" = "422"

          completion_status=$(curl --silent --show-error --output /tmp/completion-response.json --write-out "%{http_code}" \
            --request POST "$VITE_API_BASE_URL/api/recipes/1/complete" \
            --header "Authorization: Bearer $FAMILY_ACCESS_CODE" \
            --header "Content-Type: application/json" \
            --data '{"consumptions":"invalid"}')
          test "$completion_status" = "422"
